<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Noto Sans TC"', 'sans-serif'],
                        cute: ['"Jua"', '"Noto Sans TC"', 'sans-serif'],
                    },
                    colors: {
                        bgCute: '#FFF0F5', 
                        textBrown: '#5D4037', 
                        pinkMain: '#FF8DA1', 
                        pinkDark: '#FF6B8B',
                        pinkLight: '#FFE4E8',
                        pinkBorder: '#FFB6C1',
                        cuteBlue: '#BDE0FE',
                        cuteYellow: '#FFF3B0',
                        cuteOrange: '#FFDAC1',

<style>
        /* 1. 📖 韓國手帳本點陣背景 */
        body {
            background-color: #FFF0F5;
            color: #5D4037;
            -webkit-tap-highlight-color: transparent;
            background-image:
                radial-gradient(circle at 20% 80%, rgba(255, 182, 193, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(232, 221, 245, 0.5) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(255, 255, 255, 0.2) 0%, transparent 30%),
                radial-gradient(#FFB6C1 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 100% 100%, 24px 24px;
            background-position: 0 0, 0 0, 0 0, 12px 12px;
        }

        /* 4. 🎀 粉系自訂卷軸 */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #FFE4E8; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #FF8DA1; border-radius: 10px; border: 2px solid #FFE4E8; }
        ::-webkit-scrollbar-thumb:hover { background: #FF6B8B; }

        /* 2. ✨ Icon 果凍彈跳動畫 */
        @keyframes jellyBounce {
            0%, 100% { transform: scale(1) rotate(0deg); }
            25% { transform: scale(1.1) rotate(-3deg); }
            50% { transform: scale(0.95) rotate(2deg); }
            75% { transform: scale(1.05) rotate(-1deg); }
        }
        .icon-jelly {
            transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        .icon-jelly:hover {
            animation: jellyBounce 0.5s ease-out;
        }

        /* 5. ✂️ 波浪分隔線 */
        .hand-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
            opacity: 0.6;
        }
        .hand-divider::before,
        .hand-divider::after {
            content: '';
            flex: 1;
            height: 3px;
            background: url("data:image/svg+xml,%3Csvg width='40' height='6' viewBox='0 0 40 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 3 Q10 0 20 3 T40 3' stroke='%23FFB6C1' stroke-width='3' fill='none' stroke-linecap='round'/%3E%3C/svg%3E") repeat-x;
            background-size: 40px 6px;
            border-radius: 2px;
        }
        .hand-divider span { color: #FFB6C1; font-size: 14px; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 卡片底線波浪裝飾 */
        .wavy-divider {
            height: 4px;
            background: url("data:image/svg+xml,%3Csvg width='20' height='4' viewBox='0 0 20 4' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 2 Q5 0 10 2 T20 2' stroke='%23FFB6C1' stroke-width='3' fill='none' stroke-linecap='round'/%3E%3C/svg%3E") repeat-x;
            background-size: 20px 4px;
            opacity: 0.4;
            margin: 16px 0;
        }

        .cute-card {
            background-color: #FFFFFF;
            border: 3px solid #FFB6C1;
            border-radius: 28px;
            box-shadow: 4px 4px 0px #FFB6C1;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
        }
        .cute-card::before {
            content: '✦';
            position: absolute;
            top: -8px;
            left: 20px;
            font-size: 14px;
            color: #FFB6C1;
            background: #FFF0F5;
            padding: 0 6px;
        }
        .cute-card:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0px #FFB6C1; }

        .cute-btn { border: 2px solid transparent; transition: all 0.2s ease; }
        .cute-btn.active {
            background-color: #FF8DA1; color: white; border: 2px solid #FF6B8B;
            box-shadow: 3px 3px 0px #FF6B8B; transform: translateY(-2px);
        }
        .cute-btn-inactive {
            background-color: white; color: #FF8DA1; border: 2px solid #FFE4E8;
            box-shadow: 2px 2px 0px #FFE4E8;
        }

        .timeline-line {
            position: absolute; left: 1.25rem; top: 2.5rem; bottom: -1rem;
            width: 0px; border-left: 4px dashed #FFB6C1; z-index: 0;
        }
        .timeline-item:last-child .timeline-line { display: none; }
        
        .animate-fade-in { animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        .ai-bubble { border: 2px solid #FFB6C1; box-shadow: 2px 2px 0px #FFB6C1; }
        .ai-chat-content p { margin-bottom: 0.5rem; }
        .ai-chat-content p:last-child { margin-bottom: 0; }
        .ai-chat-content strong { color: #FF6B8B; }
        
        .cb-custom {
            appearance: none; background-color: #fff; margin: 0; font: inherit;
            color: currentColor; width: 1.5em; height: 1.5em; border: 2px solid #FFB6C1;
            border-radius: 0.35em; display: grid; place-content: center;
            cursor: pointer; transition: all 0.2s;
        }
        .cb-custom::before {
            content: ""; width: 0.8em; height: 0.8em; transform: scale(0);
            transition: 120ms transform ease-in-out; box-shadow: inset 1em 1em #FF8DA1;
            background-color: transform-origin: center;
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        }
        .cb-custom:checked { border-color: #FF8DA1; }
        .cb-custom:checked::before { transform: scale(1); }
        
        .bounce-slight { animation: bounceSlight 2s infinite; }
        @keyframes bounceSlight {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .modal-input {
            width: 100%; border: 2px solid #FFE4E8; border-radius: 12px; padding: 10px 14px;
            font-size: 14px; outline: none; transition: border-color 0.2s; font-family: inherit;
        }
        .modal-input:focus { border-color: #FF8DA1; }
        
        .action-btns { display: flex; gap: 8px; }
        
        .modal-content-scroll { max-height: 80vh; overflow-y: auto; padding-right: 4px; }
        .modal-content-scroll::-webkit-scrollbar { width: 6px; }
        .modal-content-scroll::-webkit-scrollbar-thumb { background-color: #FFE4E8; border-radius: 10px; }

        .transport-dot { width: 12px; height: 12px; border-radius: 50%; border: 3px solid #BDE0FE; background-color: white; z-index: 2; position: relative; }
        .transport-line { flex-grow: 1; height: 2px; background-image: linear-gradient(to right, #BDE0FE 50%, transparent 50%); background-size: 10px 10px; margin: 0 8px; }

        .hand-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
            opacity: 0.5;
        }
        .hand-divider::before,
        .hand-divider::after {
            content: '';
            flex: 1;
            height: 2px;
            background: url("data:image/svg+xml,%3Csvg width='40' height='4' viewBox='0 0 40 4' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 2 Q10 0 20 2 T40 2' stroke='%23FFB6C1' stroke-width='2' fill='none' stroke-linecap='round'/%3E%3C/svg%3E") repeat-x;
            background-size: 40px 4px;
        }
        .hand-divider span { color: #FFB6C1; font-size: 14px; }

        .cute-banner {
            background: linear-gradient(135deg, #FFE4E8 0%, #E8DFF5 50%, #FFF0F5 100%);
            border: 3px solid #FFB6C1;
            border-radius: 24px;
            padding: 16px 20px;
            margin: 12px 0 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 3px 3px 0px #FFB6C1;
            position: relative;
            overflow: hidden;
        }
        .cute-banner::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='20' height='20' viewBox='0 0 20 20' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M10 2l1.5 4.5h4.5l-3.5 2.5 1.5 4.5-4-3-4 3 1.5-4.5-3.5-2.5h4.5z' fill='%23FFB6C1' fill-opacity='0.1'/%3E%3C/svg%3E");
            pointer-events: none;
        }
        .cute-banner-icon {
            font-size: 40px;
            flex-shrink: 0;
            filter: drop-shadow(2px 2px 0px #FFB6C1);
        }
        .cute-banner-text h3 {
            font-family: 'Jua', 'Noto Sans TC', sans-serif;
            font-size: 18px;
            color: #FF6B8B;
            margin-bottom: 2px;
        }
        .cute-banner-text p {
            font-size: 12px;
            color: #5D4037;
            opacity: 0.8;
        }
    </style>
</head>

                                        <p class="text-sm text-textBrown/80 leading-relaxed mb-2">大概傍晚 5 點半左右（Magic Hour），回到室外的石村湖畔。夕陽打在城堡和遠處的樂天塔上，光影層次極佳，是拍攝人像的最佳時機。</p>
                                        <p class="text-sm text-textBrown/80 leading-relaxed mb-3">晚上 8 點室內館會有大型的夜間花車巡遊 (Night Parade) 和燈光秀。如果不看巡遊，這個時候排熱門設施的人會減少很多。</p>
                                        <div class="bg-purple-50 rounded-xl p-3 border border-purple-100">
                                            <strong class="text-sm text-purple-600 block mb-1">💡 行程溫馨提示：</strong>
                                            <p class="text-sm text-textBrown/80">由於你們晚上安排了在旁邊的松理團路吃晚餐，建議大概玩到 18:00 左右，趁天空還有點微藍調（Blue Hour）拍完亮燈的城堡後，就可以準備離園去吃好西了！</p>
                                        </div>
                                    </div>
                                </div>

                            </div>
                        </div>

                    </div>
                </div>
            `;
        }

        function handleCheck(cb) { const span = cb.nextElementSibling; if(cb.checked) { span.classList.add('line-through', 'text-gray-300'); span.classList.remove('text-textBrown'); } else { span.classList.remove('line-through', 'text-gray-300'); span.classList.add('text-textBrown'); } const state = {}; document.querySelectorAll('.checklist-box').forEach(c => state[c.id] = c.checked); localStorage.setItem('seoulTripChecklist', JSON.stringify(state)); }
        function loadChecklistState() { const savedState = JSON.parse(localStorage.getItem('seoulTripChecklist')); if(savedState) { document.querySelectorAll('.checklist-box').forEach(cb => { if(savedState[cb.id]) { cb.checked = true; cb.nextElementSibling.classList.add('line-through', 'text-gray-300'); cb.nextElementSibling.classList.remove('text-textBrown'); } }); } }

        function switchTab(tabId) {
            currentTab = tabId; document.querySelectorAll('.nav-btn').forEach(btn => { btn.classList.remove('active'); btn.classList.add('cute-btn-inactive'); });
            const activeBtn = document.querySelector(`.nav-btn[data-tab="${tabId}"]`);
            if(activeBtn) { activeBtn.classList.remove('cute-btn-inactive'); activeBtn.classList.add('active'); activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' }); }
            
            if (tabId === 'overview') renderOverview(); 
            else if (tabId === 'checklist') renderChecklist(); 
            else if (tabId === 'transport') renderTransport(); 
            else if (tabId === 'lotteworld') renderLotteGuide();
            else if (tabId === 'shopping' || tabId === 'food') renderGuide(tabId); 
            else renderDay(tabId); 
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        document.addEventListener('DOMContentLoaded', () => { switchTab('overview'); fetchWeather(); setInterval(fetchWeather, 30 * 60 * 1000); });

        function closeModal(id) { const el = document.getElementById(id); el.classList.remove('opacity-100'); setTimeout(() => { el.classList.add('hidden'); }, 200); }
        function openModal(id) { const el = document.getElementById(id); el.classList.remove('hidden'); setTimeout(() => { el.classList.add('opacity-100'); }, 10); }

        function createSubItemRowHtml(name = '', desc = '', keyword = '') { return `<div class="sub-item-row bg-gray-50 border border-pinkBorder/50 rounded-xl p-3 relative group"><button type="button" onclick="this.parentElement.remove()" class="absolute -top-2 -right-2 bg-white text-red-400 border border-red-200 rounded-full p-1 shadow-sm hover:bg-red-50 hover:text-red-600 transition-colors z-10"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg></button><div class="space-y-2"><input type="text" class="si-name w-full bg-white border border-gray-200 rounded-lg px-3 py-1.5 text-sm outline-none focus:border-pinkMain" placeholder="名稱 (如: 橋村炸雞)" value="${name}"><div class="flex gap-2"><input type="text" class="si-desc flex-1 bg-white border border-gray-200 rounded-lg px-3 py-1.5 text-sm outline-none focus:border-pinkMain" placeholder="備註描述" value="${desc}"><input type="text" class="si-keyword flex-1 bg-white border border-gray-200 rounded-lg px-3 py-1.5 text-sm outline-none focus:border-pinkMain" placeholder="導航關鍵字" value="${keyword}"></div></div></div>`; }
        function renderSubItems(items = []) { const container = document.getElementById('subItemsContainer'); container.innerHTML = ''; items.forEach(item => { container.insertAdjacentHTML('beforeend', createSubItemRowHtml(item.name, item.desc, item.keyword || '')); }); }
        function addSubItemRow() { document.getElementById('subItemsContainer').insertAdjacentHTML('beforeend', createSubItemRowHtml()); }
        function getSubItemsData() { const items = []; document.querySelectorAll('.sub-item-row').forEach(row => { const name = row.querySelector('.si-name').value.trim(); const desc = row.querySelector('.si-desc').value.trim(); const keyword = row.querySelector('.si-keyword').value.trim(); if (name || desc) items.push({ name: name, desc: desc, keyword: keyword, link: keyword ? gMap(keyword) : null }); }); return items; }

        function deleteEvent(dayId, index) { if(!confirm("確定要刪除這個行程嗎？")) return; const day = appData.days.find(d => d.id === dayId); if(day) { day.events.splice(index, 1); saveAppData(); renderDay(dayId); } }
        function openAddEventModal(dayId) { document.getElementById('evModalTitle').innerHTML = '<span>✨</span> 新增行程'; document.getElementById('evDayId').value = dayId; document.getElementById('evIndex').value = ''; document.getElementById('evTime').value = ''; document.getElementById('evTitle').value = ''; document.getElementById('evDesc').value = ''; document.getElementById('evLocation').value = ''; document.getElementById('evType').value = 'shop'; renderSubItems([]); openModal('eventModal'); }
        function openEditEventModal(dayId, index) { const day = appData.days.find(d => d.id === dayId); const event = day.events[index]; document.getElementById('evModalTitle').innerHTML = '<span>✏️</span> 編輯行程'; document.getElementById('evDayId').value = dayId; document.getElementById('evIndex').value = index; document.getElementById('evTime').value = event.time || ''; document.getElementById('evTitle').value = event.title || ''; document.getElementById('evDesc').value = event.desc || ''; document.getElementById('evLocation').value = event.location || ''; document.getElementById('evType').value = event.type || 'shop'; renderSubItems(event.subItems || []); openModal('eventModal'); }
        function submitEvent() { const dayId = document.getElementById('evDayId').value; const indexStr = document.getElementById('evIndex').value; const time = document.getElementById('evTime').value || '時間未定'; const title = document.getElementById('evTitle').value; const desc = document.getElementById('evDesc').value; const location = document.getElementById('evLocation').value; const typeKey = document.getElementById('evType').value; if(!title) return alert("請填寫標題喔！"); const tConf = typeConfig[typeKey]; const eventData = { time: time, type: typeKey, icon: tConf.icon, color: tConf.color, title: title, desc: desc, location: location, routeDesc: location ? '打開地圖' : null, routeLink: location ? gMap(location) : null, subItems: getSubItemsData() }; const day = appData.days.find(d => d.id === dayId); if(day) { if (indexStr === '') { eventData.duration = ''; day.events.push(eventData); } else { eventData.duration = day.events[parseInt(indexStr)].duration; day.events[parseInt(indexStr)] = eventData; } saveAppData(); closeModal('eventModal'); renderDay(dayId); } }

        function deleteGuideItem(type, catIndex, itemIndex) { if(!confirm("確定要刪除這個地點嗎？")) return; const data = type === 'shopping' ? appData.shoppingGuide : appData.foodGuide; data[catIndex].items.splice(itemIndex, 1); saveAppData(); renderGuide(type); }
        function openAddGuideModal(type, catIndex) { document.getElementById('gdModalTitle').innerHTML = '<span>📌</span> 新增地點'; document.getElementById('gdType').value = type; document.getElementById('gdCatIndex').value = catIndex; document.getElementById('gdItemIndex').value = ''; document.getElementById('gdName').value = ''; document.getElementById('gdDesc').value = ''; document.getElementById('gdKeyword').value = ''; openModal('guideModal'); }
        function openEditGuideModal(type, catIndex, itemIndex) { const data = type === 'shopping' ? appData.shoppingGuide : appData.foodGuide; const item = data[catIndex].items[itemIndex]; document.getElementById('gdModalTitle').innerHTML = '<span>✏️</span> 編輯地點'; document.getElementById('gdType').value = type; document.getElementById('gdCatIndex').value = catIndex; document.getElementById('gdItemIndex').value = itemIndex; document.getElementById('gdName').value = item.name || ''; document.getElementById('gdDesc').value = item.desc || ''; document.getElementById('gdKeyword').value = item.keyword || ''; openModal('guideModal'); }
        function submitGuideItem() { const type = document.getElementById('gdType').value; const catIndex = document.getElementById('gdCatIndex').value; const indexStr = document.getElementById('gdItemIndex').value; const name = document.getElementById('gdName').value; const desc = document.getElementById('gdDesc').value; const keyword = document.getElementById('gdKeyword').value; if(!name) return alert("店名是必填的喔！"); const isShop = type === 'shopping'; const categoryObj = isShop ? appData.shoppingGuide[catIndex] : appData.foodGuide[catIndex]; let locTag = indexStr !== '' ? categoryObj.items[parseInt(indexStr)].location : (isShop ? categoryObj.category.replace(/[^a-zA-Z\u4e00-\u9fa5]/g, '').trim() : categoryObj.location); const itemData = { name: name, desc: desc, location: locTag, keyword: keyword, link: keyword ? gMap(keyword) : null }; if (indexStr === '') categoryObj.items.push(itemData); else categoryObj.items[parseInt(indexStr)] = itemData; saveAppData(); closeModal('guideModal'); renderGuide(type); }

        function deleteTransport(index) { if(!confirm("確定要刪除這條路線嗎？")) return; appData.transportGuide.splice(index, 1); saveAppData(); renderTransport(); }
        function openAddTransportModal(day = 'Day 1') { document.getElementById('tpModalTitle').innerHTML = '<span>🚇</span> 新增交通路線'; document.getElementById('tpIndex').value = ''; document.getElementById('tpDay').value = day; document.getElementById('tpTitle').value = ''; document.getElementById('tpOrigin').value = ''; document.getElementById('tpDest').value = ''; document.getElementById('tpMode').value = 'transit'; document.getElementById('tpTime').value = ''; document.getElementById('tpDesc').value = ''; openModal('transportModal'); }
        function openEditTransportModal(index) { const route = appData.transportGuide[index]; document.getElementById('tpModalTitle').innerHTML = '<span>✏️</span> 編輯交通路線'; document.getElementById('tpIndex').value = index; document.getElementById('tpDay').value = route.day; document.getElementById('tpTitle').value = route.title; document.getElementById('tpOrigin').value = route.origin; document.getElementById('tpDest').value = route.dest; document.getElementById('tpMode').value = route.mode; document.getElementById('tpTime').value = route.time; document.getElementById('tpDesc').value = route.desc; openModal('transportModal'); }
        function submitTransport() { const indexStr = document.getElementById('tpIndex').value; const day = document.getElementById('tpDay').value; const title = document.getElementById('tpTitle').value; const origin = document.getElementById('tpOrigin').value; const dest = document.getElementById('tpDest').value; const mode = document.getElementById('tpMode').value; const time = document.getElementById('tpTime').value; const desc = document.getElementById('tpDesc').value; if(!title || !origin || !dest) return alert("標題、起點與終點都必須填寫喔！"); const routeData = { id: indexStr !== '' ? appData.transportGuide[parseInt(indexStr)].id : 't' + Date.now(), day: day, title: title, origin: origin, dest: dest, mode: mode, time: time, desc: desc }; if (indexStr === '') appData.transportGuide.push(routeData); else appData.transportGuide[parseInt(indexStr)] = routeData; appData.transportGuide.sort((a, b) => a.day.localeCompare(b.day)); saveAppData(); closeModal('transportModal'); renderTransport(); }

        function deleteChecklistCategory(catIndex) { if(!confirm("確定要刪除這個分類嗎？")) return; appData.checklistData.categories.splice(catIndex, 1); saveAppData(); renderChecklist(); }
        function openAddChecklistCatModal() { document.getElementById('clCatModalTitle').innerHTML = '<span>📂</span> 新增分類'; document.getElementById('clCatIndex').value = ''; document.getElementById('clCatTitle').value = ''; openModal('checklistCatModal'); }
        function openEditChecklistCatModal(catIndex) { const cat = appData.checklistData.categories[catIndex]; document.getElementById('clCatModalTitle').innerHTML = '<span>✏️</span> 編輯分類'; document.getElementById('clCatIndex').value = catIndex; document.getElementById('clCatTitle').value = cat.title || ''; openModal('checklistCatModal'); }
        function submitChecklistCategory() { const indexStr = document.getElementById('clCatIndex').value; const title = document.getElementById('clCatTitle').value; if(!title) return alert("請填寫分類標題喔！"); if (indexStr === '') { appData.checklistData.categories.push({ title: title, items: [] }); } else { appData.checklistData.categories[parseInt(indexStr)].title = title; } saveAppData(); closeModal('checklistCatModal'); renderChecklist(); }

        function deleteChecklistItem(catIndex, itemIndex) { if(!confirm("確定要刪除這個物品嗎？")) return; appData.checklistData.categories[catIndex].items.splice(itemIndex, 1); saveAppData(); renderChecklist(); }
        function openAddChecklistItemModal(catIndex) { document.getElementById('clItemModalTitle').innerHTML = '<span>✅</span> 新增物品'; document.getElementById('clItemCatIndex').value = catIndex; document.getElementById('clItemIndex').value = ''; document.getElementById('clItemText').value = ''; openModal('checklistItemModal'); }
        function openEditChecklistItemModal(catIndex, itemIndex) { const item = appData.checklistData.categories[catIndex].items[itemIndex]; document.getElementById('clItemModalTitle').innerHTML = '<span>✏️</span> 編輯物品'; document.getElementById('clItemCatIndex').value = catIndex; document.getElementById('clItemIndex').value = itemIndex; document.getElementById('clItemText').value = item.text || ''; openModal('checklistItemModal'); }
        function submitChecklistItem() { const catIndex = document.getElementById('clItemCatIndex').value; const indexStr = document.getElementById('clItemIndex').value; const text = document.getElementById('clItemText').value; if(!text) return alert("請填寫物品描述喔！"); const itemData = { id: 'c' + Date.now(), text: text }; if (indexStr === '') { appData.checklistData.categories[parseInt(catIndex)].items.push(itemData); } else { appData.checklistData.categories[parseInt(catIndex)].items[parseInt(indexStr)] = itemData; } saveAppData(); closeModal('checklistItemModal'); renderChecklist(); }
    </script>
</body>
